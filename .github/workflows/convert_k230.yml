name: Convert YOLO to K230 Kmodel

on:
  push:
    branches: [convert-request]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 7.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ultralytics opencv-python-headless numpy
          pip install nncase==2.8.3 nncase-kpu==2.8.3

      - name: Run conversion
        env:
          K230_MODEL_PATH: models/input.pt
          K230_KMODEL_PATH: results/output.kmodel
          K230_CALIB_DIR: calib/
          K230_INPUT_SHAPE: "1,3,320,320"
          K230_ONNX_IMGSZ: "320"
          K230_ONNX_OPSET: "11"
          K230_ONNX_SIMPLIFY: "true"
          K230_ONNX_NMS: "false"
          K230_QUANT_TYPE: "uint8"
          K230_W_QUANT_TYPE: "uint8"
          K230_CALIB_METHOD: "Kld"
          K230_MAX_CALIB_IMAGES: "999"
          K230_TARGET: "k230"
        run: |
          mkdir -p results
          python convert_k230.py

      - name: Upload Kmodel artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k230-model
          path: results/*.kmodel
          if-no-files-found: warn